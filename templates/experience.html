<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience - {{ name }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">{{ name }}</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link active" href="experience.html">Experience</a>
            </div>
        </div>
    </nav>
    <main class="container my-5">
        <h1 class="mb-4">Professional Experience</h1>
        <div class="row">
            {% for job in experience %}
            <div class="col-12 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h3 class="card-title h4 mb-0">{{ job.role }}</h3>
                            <span class="text-muted">{{ job.period }}</span>
                        </div>
                        <h4 class="h5 text-primary mb-3">{{ job.org }}</h4>
                        <ul>
                            {% for bullet in job.bullets %}
                            <li>{{ bullet }}</li>
                            {% endfor %}
                        </ul>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>
    <footer class="text-center py-4 text-muted border-top">
        <p>&copy; 2026 {{ name }}. Built with Flask.</p>
    </footer>
</body>
</html>
