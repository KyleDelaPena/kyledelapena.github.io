<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ name }} - Portfolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">{{ name }}</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="index.html">Home</a>
                <a class="nav-link" href="experience.html">Experience</a>
            </div>
        </div>
    </nav>
    <header class="text-center py-5 bg-white shadow-sm">
        <div class="container">
            <img src="{{ url_for('static', filename=profile_pic) }}" class="rounded-circle mb-3 shadow" width="150" height="150" alt="Profile Picture">
            <h1 class="display-4">{{ name }}</h1>
            <p class="lead text-muted">{{ title }} at {{ company }}</p>
            <p class="text-secondary">{{ location }}</p>
            <a href="{{ linkedin_url }}" target="_blank" class="btn btn-primary">Connect on LinkedIn</a>
        </div>
    </header>
    <main class="container my-5">
        <div class="row">
            <div class="col-md-8">
                <section class="mb-5 p-4 bg-white rounded shadow-sm">
                    <h2 class="border-bottom pb-2">About Me</h2>
                    <p>{{ about_text }}</p>
                </section>
            </div>
            <div class="col-md-4">
                <section class="p-4 bg-white rounded shadow-sm">
                    <h2 class="border-bottom pb-2">Skills</h2>
                    <div class="d-flex flex-wrap gap-2">
                        {% for skill in skills %}
                        <span class="badge bg-secondary">{{ skill }}</span>
                        {% endfor %}
                    </div>
                </section>
            </div>
        </div>
    </main>
    <footer class="text-center py-4 text-muted border-top">
        <p>&copy; 2026 {{ name }}. Built with Flask.</p>
    </footer>
</body>
</html>
